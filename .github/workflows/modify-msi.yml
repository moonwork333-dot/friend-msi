name: Modify Friend MSI for Your Hub

on:
  workflow_dispatch:
    inputs:
      hub_url:
        description: 'Hub URL for agents to connect to'
        required: true
        default: 'https://watson-parts.com/agenthub'

jobs:
  modify-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find MSI file
        shell: powershell
        run: |
          $msiFiles = Get-ChildItem -Path (Get-Location) -Filter "*.msi" -Recurse
          
          if ($msiFiles.Count -eq 0) {
            Write-Error "No MSI files found in repository"
            exit 1
          }
          
          $msiPath = $msiFiles[0].FullName
          Write-Host "Found MSI: $msiPath"
          Write-Host "msi_path=$msiPath" >> $env:GITHUB_ENV

      - name: Extract MSI using msiexec
        shell: cmd
        run: |
          set MSI_PATH=%msi_path%
          set EXTRACT_PATH=C:\msi_extracted
          
          echo Extracting MSI using msiexec...
          msiexec /a "%MSI_PATH%" TARGETDIR="%EXTRACT_PATH%" /qb
          
          if not exist "%EXTRACT_PATH%" (
            echo ERROR: Extraction failed
            exit /b 1
          )
          
          echo Extraction complete
          echo Directory structure:
          dir /s "%EXTRACT_PATH%"

      - name: Find and modify config.json
        shell: powershell
        run: |
          $extractPath = "C:\msi_extracted"
          $hubUrl = "${{ github.event.inputs.hub_url }}"
          
          Write-Host "Searching for config.json..."
          
          $configFiles = Get-ChildItem -Path $extractPath -Filter "config.json" -Recurse
          
          if ($configFiles.Count -eq 0) {
            Write-Host "ERROR: config.json not found"
            Write-Host "Files in extracted MSI:"
            Get-ChildItem -Path $extractPath -Recurse | Select-Object FullName
            exit 1
          }
          
          Write-Host "Found $($configFiles.Count) config.json file(s)"
          
          foreach ($configFile in $configFiles) {
            Write-Host "Modifying: $($configFile.FullName)"
            
            try {
              $config = Get-Content $configFile.FullName | ConvertFrom-Json
              $config.hubUrl = $hubUrl
              $config | ConvertTo-Json | Set-Content $configFile.FullName
              
              Write-Host "Updated hubUrl to: $hubUrl"
              Get-Content $configFile.FullName
            } catch {
              Write-Error "Failed to modify config.json: $_"
              exit 1
            }
          }

      - name: Repackage MSI using makecab
        shell: cmd
        run: |
          set EXTRACT_PATH=C:\msi_extracted
          set OUTPUT_MSI=PENG_RMM_Agent-Modified-1.0.0.0.msi
          
          echo Creating DDF file for makecab...
          
          (
            echo .Set CabinetNameTemplate=%OUTPUT_MSI%
            echo .Set DiskDirectoryTemplate=CDROM
            echo .Set CompressionType=MSZIP
            echo .Set MaxDiskSize=2147483647
            echo.
            for /r "%EXTRACT_PATH%" %%%%F in (*) do echo %%%%F
          ) > msi.ddf
          
          echo Repackaging with makecab...
          makecab.exe /F msi.ddf
          
          if exist "%OUTPUT_MSI%" (
            echo Modified MSI created: %OUTPUT_MSI%
            dir "%OUTPUT_MSI%"
          ) else (
            echo ERROR: Failed to create modified MSI
            exit /b 1
          )

      - name: Upload Modified MSI
        uses: actions/upload-artifact@v4
        with:
          name: modified-msi
          path: PENG_RMM_Agent-Modified-1.0.0.0.msi
          retention-days: 30

      - name: Create Release with Modified MSI
        uses: softprops/action-gh-release@v1
        with:
          files: PENG_RMM_Agent-Modified-1.0.0.0.msi
          tag_name: modified-msi-${{ github.run_number }}
          body: |
            Modified MSI for your RMM hub deployment
            - Hub URL: ${{ github.event.inputs.hub_url }}
            - Based on: friend-msi/PENG_RMM_Agent-1.0.0.0.msi
            - Build: ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
